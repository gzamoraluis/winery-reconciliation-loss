<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winery Loss Reconciliation</title>

<style>
body { font-family: Arial; margin: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
input { width: 80px; }
button { margin: 10px 5px; padding: 6px 12px; }
.good { color: green; }
.bad { color: red; }
</style>
</head>

<body>

<h2>Winery Loss Reconciliation Tool</h2>

<h3>Inputs</h3>
Gal / Barrel: <input id="galPerBarrel" value="59"><br>
Total Lees: <input id="lees" value="15"><br>
Final Target: <input id="target" value="8400"><br>

<h3>Lotes</h3>
<table id="lotesTable">
<tr>
<th>Lote</th>
<th>Barriles</th>
<th>Base</th>
<th>Lees</th>
<th>Base Ajustada</th>
<th>Pérdida</th>
<th>Total Lote</th>
<th>Acumulado</th>
</tr>
</table>

<button onclick="addLote()">+ Lote</button>

<h3>Contenedores</h3>
<table id="contTable">
<tr><th>Galones</th></tr>
</table>

<button onclick="addContainer()">+ Contenedor</button>

<button onclick="calculate()">Calcular</button>

<h3>Reporte</h3>
<div id="report"></div>

<script>

function round(num) {
    return Math.round(num);
}

function addLote() {
    let table = document.getElementById("lotesTable");
    let row = table.insertRow();
    let index = table.rows.length - 1;

    row.innerHTML = `
        <td>${index}</td>
        <td><input type="number" value="0"></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    `;
}

function addContainer() {
    let table = document.getElementById("contTable");
    let row = table.insertRow();
    row.innerHTML = `<td><input type="number" value="0"></td>`;
}

function calculate() {

    let gal = parseFloat(document.getElementById("galPerBarrel").value);
    let lees = parseFloat(document.getElementById("lees").value);
    let target = parseFloat(document.getElementById("target").value);

    let rows = document.getElementById("lotesTable").rows;

    let barrilesTotal = 0;

    for (let i = 1; i < rows.length; i++) {
        barrilesTotal += parseFloat(rows[i].cells[1].children[0].value) || 0;
    }

    let baseTotal = 0;

    // BASE + LEES
    for (let i = 1; i < rows.length; i++) {

        let barriles = parseFloat(rows[i].cells[1].children[0].value) || 0;

        let base = barriles * gal;
        let leesShare = barrilesTotal ? -(barriles / barrilesTotal) * lees : 0;
        let adjusted = base + leesShare;

        rows[i].cells[2].innerText = round(base);
        rows[i].cells[3].innerText = round(leesShare);
        rows[i].cells[4].innerText = round(adjusted);

        baseTotal += adjusted;
    }

    // CONTENEDORES
    let contRows = document.getElementById("contTable").rows;
    let contTotal = 0;

    for (let i = 1; i < contRows.length; i++) {
        contTotal += parseFloat(contRows[i].cells[0].children[0].value) || 0;
    }

    let systemTotal = baseTotal + contTotal;

    // VALIDACIÓN: SOLO PÉRDIDA
    if (target > systemTotal) {
        document.getElementById("report").innerHTML =
            "<span class='bad'>ERROR: El target es mayor que el volumen disponible (no se permite ganancia)</span>";
        return;
    }

    let lossTotal = systemTotal - target;

    let accumulated = 0;

    // DISTRIBUCIÓN DE PÉRDIDA
    for (let i = 1; i < rows.length; i++) {

        let adjusted = parseFloat(rows[i].cells[4].innerText) || 0;

        let loss = baseTotal ? (adjusted / baseTotal) * lossTotal : 0;
        let total = adjusted - loss;

        accumulated += total;

        rows[i].cells[5].innerText = round(loss);
        rows[i].cells[6].innerText = round(total);
        rows[i].cells[7].innerText = round(accumulated);
    }

    let finalTotal = accumulated + contTotal;
    let check = finalTotal - target;

    document.getElementById("report").innerHTML = `
        Total Lotes: ${round(accumulated)} <br>
        Contenedores: ${round(contTotal)} <br>
        FINAL: ${round(finalTotal)} <br>
        Target: ${target} <br>
        Pérdida Total: ${round(lossTotal)} <br>
        Check: <span class="${check === 0 ? 'good' : 'bad'}">${round(check)}</span>
    `;
}

</script>

</body>
</html>
