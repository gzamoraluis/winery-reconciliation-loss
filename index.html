<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winery App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h2>🍷 Reconciliation</h2>

  <div class="card">
    <label>Gal / Barrel</label>
    <input id="galPerBarrel" value="59">

    <label>Total Lees</label>
    <input id="lees" value="15">

    <label>Final Target</label>
    <input id="target" value="8662">
  </div>

  <div class="card">
    <h3>Lotes</h3>
    <table id="lotesTable">
      <tr>
        <th>#</th>
        <th>Br</th>
        <th>Base</th>
        <th>Lees</th>
        <th>Adj</th>
        <th>Loss</th>
        <th>Total</th>
      </tr>
    </table>

    <button onclick="addLote()">+ Lote</button>
  </div>

  <div class="card">
    <h3>Contenedores</h3>
    <table id="contTable">
      <tr><th>Gal</th></tr>
    </table>

    <button onclick="addContainer()">+ Cont</button>
  </div>

  <button class="main-btn" onclick="calculate()">Calcular</button>

  <div id="report" class="card"></div>

</div>

<script src="script.js"></script>

</body>
</html>
