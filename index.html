<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winery Loss Reconciliation</title>

<style>
body { font-family: Arial; margin: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
input { width: 80px; }
button { margin: 10px 5px; padding: 6px 12px; }

.good { color: green; }
.bad { color: red; }

</style>
</head>

<body>

<h2>Winery Reconciliation (LOSS ONLY)</h2>

<h3>Inputs</h3>
Gal / Barrel: <input id="galPerBarrel" value="59"><br>
Total Lees: <input id="lees" value="15"><br>
Final Target: <input id="target" value="8662"><br>

<h3>Lotes</h3>
<table id="lotesTable">
<tr>
<th>Lote</th>
<th>Barriles</th>
<th>Base</th>
<th>Lees</th>
<th>Base Ajustada</th>
<th>Pérdida</th>
<th>Total Lote</th>
<th>Acumulado</th>
</tr>
</table>

<button onclick="addLote()">+ Lote</button>

<h3>Contenedores</h3>
<table id="contTable">
<tr><th>Galones</th></tr>
</table>

<button onclick="addContainer()">+ Contenedor</button>

<br><br>
<button onclick="calculate()">Calcular</button>

<div id="report" style="margin-top:20px;"></div>

<script>

// Añadir lote
function addLote() {
    let table = document.getElementById("lotesTable");
    let row = table.insertRow();
    let index = table.rows.length - 1;

    row.innerHTML = `
        <td>${index}</td>
        <td><input type="number" value="0"></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    `;
}

// Añadir contenedor
function addContainer() {
    let table = document.getElementById("contTable");
    let row = table.insertRow();
    row.innerHTML = `<td><input type="number" value="0"></td>`;
}

// Cálculo principal
function calculate() {

    let gal = parseFloat(document.getElementById("galPerBarrel").value);
    let lees = parseFloat(document.getElementById("lees").value);
    let target = parseFloat(document.getElementById("target").value);

    let table = document.getElementById("lotesTable");
    let rows = table.rows;

    let barrilesTotal = 0;

    // Total barriles
    for (let i = 1; i < rows.length; i++) {
        barrilesTotal += parseFloat(rows[i].cells[1].children[0].value) || 0;
    }

    let baseTotal = 0;

    // Primera pasada
    for (let i = 1; i < rows.length; i++) {

        let barriles = parseFloat(rows[i].cells[1].children[0].value) || 0;

        let base = barriles * gal;

        let leesShare = barrilesTotal ? -(barriles / barrilesTotal) * lees : 0;

        let adjusted = base + leesShare;

        rows[i].cells[2].innerText = base.toFixed(1);
        rows[i].cells[3].innerText = leesShare.toFixed(1);
        rows[i].cells[4].innerText = adjusted.toFixed(1);

        baseTotal += adjusted;
    }

    // Contenedores
    let contTable = document.getElementById("contTable");
    let contTotal = 0;

    for (let i = 1; i < contTable.rows.length; i++) {
        contTotal += parseFloat(contTable.rows[i].cells[0].children[0].value) || 0;
    }

    // 🔴 SOLO PÉRDIDA
    let lossTotal = (baseTotal + contTotal) - target;

    if (lossTotal < 0) {
        lossTotal = 0; // nunca ganancia
    }

    let accumulated = 0;

    // Segunda pasada
    for (let i = 1; i < rows.length; i++) {

        let adjusted = parseFloat(rows[i].cells[4].innerText) || 0;

        let loss = baseTotal ? (adjusted / baseTotal) * lossTotal : 0;

        let total = adjusted - loss;

        accumulated += total;

        rows[i].cells[5].innerText = loss.toFixed(1);
        rows[i].cells[6].innerText = total.toFixed(1);
        rows[i].cells[7].innerText = accumulated.toFixed(1);
    }

    let finalTotal = accumulated + contTotal;
    let check = finalTotal - target;

    document.getElementById("report").innerHTML = `
        <b>Total Lotes:</b> ${accumulated.toFixed(1)}<br>
        <b>Contenedores:</b> ${contTotal.toFixed(1)}<br>
        <b>FINAL:</b> ${finalTotal.toFixed(1)}<br>
        <b>Target:</b> ${target}<br>
        <b>Check:</b> 
        <span class="${Math.abs(check) < 0.1 ? 'good' : 'bad'}">
        ${check.toFixed(1)}
        </span>
    `;
}

</script>

</body>
</html>
