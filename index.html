<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winery Reconciliation Tool</title>
<style>
body { font-family: Arial; margin: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
input { width: 80px; }
button { margin: 10px 5px; padding: 6px 12px; }
.summary { margin-top: 20px; font-weight: bold; }
.good { color: green; }
.bad { color: red; }
</style>
</head>

<body>

<h2>Winery Reconciliation App</h2>

<h3>Inputs</h3>
Gal / Barrel: <input id="galPerBarrel" value="59"><br>
Total Lees: <input id="lees" value="15"><br>
Final Target: <input id="target" value="8662"><br>

<h3>Lotes</h3>
<table id="lotesTable">
<tr>
<th>Lote</th>
<th>Barriles</th>
<th>Base</th>
<th>Lees</th>
<th>Base Ajustada</th>
<th>Ajuste</th>
<th>Total Lote</th>
<th>Acumulado</th>
</tr>
</table>

<button onclick="addLote()">+ Lote</button>

<h3>Contenedores</h3>
<table id="contTable">
<tr><th>Galones</th></tr>
</table>

<button onclick="addContainer()">+ Contenedor</button>

<button onclick="calculate()">Calcular</button>

<div class="summary" id="report"></div>

<script>

function addLote() {
    let table = document.getElementById("lotesTable");
    let row = table.insertRow();
    let index = table.rows.length - 1;

    row.innerHTML = `
        <td>${index}</td>
        <td><input type="number" value="0"></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    `;
}

function addContainer() {
    let table = document.getElementById("contTable");
    let row = table.insertRow();
    row.innerHTML = `<td><input type="number" value="0"></td>`;
}

function calculate() {

    let gal = parseFloat(document.getElementById("galPerBarrel").value);
    let lees = parseFloat(document.getElementById("lees").value);
    let target = parseFloat(document.getElementById("target").value);

    let table = document.getElementById("lotesTable");
    let rows = table.rows;

    let barrilesTotal = 0;
    for (let i = 1; i < rows.length; i++) {
        barrilesTotal += parseFloat(rows[i].cells[1].children[0].value) || 0;
    }

    let baseTotal = 0;

    // First pass
    for (let i = 1; i < rows.length; i++) {
        let barriles = parseFloat(rows[i].cells[1].children[0].value) || 0;

        let base = barriles * gal;
        let leesShare = barrilesTotal ? -(barriles / barrilesTotal) * lees : 0;
        let adjusted = base + leesShare;

        rows[i].cells[2].innerText = base.toFixed(2);
        rows[i].cells[3].innerText = leesShare.toFixed(2);
        rows[i].cells[4].innerText = adjusted.toFixed(2);

        baseTotal += adjusted;
    }

    // Containers
    let contTable = document.getElementById("contTable");
    let contTotal = 0;
    for (let i = 1; i < contTable.rows.length; i++) {
        contTotal += parseFloat(contTable.rows[i].cells[0].children[0].value) || 0;
    }

    // Adjustment
    let adjustmentTotal = target - (baseTotal + contTotal);

    // Second pass
    let accumulated = 0;

    for (let i = 1; i < rows.length; i++) {
        let adjusted = parseFloat(rows[i].cells[4].innerText) || 0;

        let adj = baseTotal ? (adjusted / baseTotal) * adjustmentTotal : 0;
        let total = adjusted + adj;

        accumulated += total;

        rows[i].cells[5].innerText = adj.toFixed(2);
        rows[i].cells[6].innerText = total.toFixed(2);
        rows[i].cells[7].innerText = accumulated.toFixed(2);
    }

    let finalTotal = accumulated + contTotal;
    let check = finalTotal - target;

    let report = document.getElementById("report");

    report.innerHTML = `
        Total Lotes: ${accumulated.toFixed(2)} <br>
        Contenedores: ${contTotal.toFixed(2)} <br>
        FINAL: ${finalTotal.toFixed(2)} <br>
        Target: ${target} <br>
        Check: <span class="${check === 0 ? 'good' : 'bad'}">${check.toFixed(2)}</span>
    `;
}

</script>

</body>
</html>
